name: CI/CD Deploy to k3s

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: zhlbn42/myapp # Укажи свой логин на Docker Hub

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Линт
      - name: Lint Kubernetes manifests
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: k8s

      # 2. Логин в Docker Hub (через официальный экшен)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Сборка и пуш образа
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: zhlbn42
          key: ${{ secrets.SSH_KEY }}
          # ПЕРЕДАЕМ ПЕРЕМЕННЫЕ НА СЕРВЕР
          envs: IMAGE_NAME, GITHUB_SHA
          script: |
            set -e
            
            # Теперь эти переменные доступны внутри SSH-сессии
            cd /home/zhlbn42/kuber/k8s
            
            # Сначала применяем манифесты (если меняли порты или лимиты)
            kubectl apply -f .
            
            # А теперь принудительно обновляем имидж на тот, что только что собрали
            # Важно: имя контейнера (myapp) должно совпадать с тем, что в deployment.yaml
            kubectl set image deployment/myapp myapp=${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # Ждём завершения обновления
            kubectl rollout status deployment/myapp
            
            # Финальный чек
            kubectl get pods
