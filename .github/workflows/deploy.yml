name: CI/CD Deploy to k3s

on:
  push:
    branches: ["main"]

env:
  # Замени 'your-dockerhub-user' на свой логин в Docker Hub
  IMAGE_NAME: your-dockerhub-user/myapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Линт (проверка манифестов на ошибки и безопасность)
      - name: Lint Kubernetes manifests
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: k8s
          config: .kube-linter.yaml
          # Если хочешь пока игнорировать ошибки безопасности, 
          # создай файл .kube-linter.yaml (см. ниже)

      # 2. Логин в Docker Hub (через официальный экшен)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Сборка и пуш образа с уникальным тегом (SHA коммита)
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: zhlbn42
          key: ${{ secrets.SSH_KEY }}
          # КРИТИЧНО: пробрасываем переменные окружения на твой VPS
          envs: IMAGE_NAME, GITHUB_SHA
          script: |
            set -e
            
            # Переходим в папку с проектом
            cd /home/zhlbn42/kuber
            
            # Обновляем файлы манифестов из гита
            git pull origin main || echo "Warning: git pull failed"
            
            # 1. Применяем конфиги (Service, ConfigMap и т.д.)
            kubectl apply -f k8s/
            
            # 2. Обновляем образ в Deployment на только что собранный
            # Убедись, что в deployment.yaml контейнер называется 'myapp'
            kubectl set image deployment/myapp myapp=${{ env.IMAGE_NAME }}:${{ github.sha }}
            
            # 3. Ждем, пока поды успешно перезапустятся
            kubectl rollout status deployment/myapp
            
            # 4. Проверяем результат
            kubectl get pods
